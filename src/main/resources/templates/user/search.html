<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>ユーザー検索</title>
    <style>
        body { font-family: sans-serif; max-width: 600px; margin: 40px auto; padding: 0 20px; }
        h1 { color: #333; }
        form { display: flex; gap: 8px; margin-top: 24px; }
        input[type="text"] { flex: 1; padding: 8px 12px; font-size: 1rem; border: 1px solid #ccc; border-radius: 4px; }
        button { padding: 8px 20px; font-size: 1rem; background: #4a90d9; color: #fff; border: none; border-radius: 4px; cursor: pointer; }
        button:hover { background: #357abd; }
        .error { margin-top: 16px; color: #c0392b; background: #fdecea; padding: 10px 14px; border-radius: 4px; }
        .hint { margin-top: 20px; color: #666; font-size: 0.9rem; }
    </style>
</head>
<body>
    <h1>ユーザー検索</h1>
    <form action="/users/" method="get" onsubmit="this.action='/users/' + document.getElementById('userId').value; return true;">
        <input type="text" id="userId" name="userId" placeholder="ユーザーIDを入力" required>
        <button type="submit">検索</button>
    </form>

    <div th:if="${errorMessage}" class="error" th:text="${errorMessage}"></div>

    <p class="hint">例: user001, user002, user003, alice, bob</p>
</body>
</html>
